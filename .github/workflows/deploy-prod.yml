name: Deploy Production (Stage A — simple)

# Stage A: single frontend container.
# Triggers: push to main + manual via workflow_dispatch.
# Steps: build image on GHA runner -> push to GHCR -> SSH to VPS -> pull + restart.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: prod-deploy
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/levkovych67/lyceum-157-frontend

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_API_BASE=https://api.lyceum157-kiev.shop/api/v1
            NEXT_PUBLIC_SITE_URL=https://lyceum157-kiev.shop
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/lyceum157
            sudo docker compose pull frontend
            sudo docker compose up -d frontend
            # Wait for healthcheck (max 90s)
            for i in $(seq 1 45); do
              if curl -fs http://127.0.0.1:3000/ >/dev/null; then
                echo "Frontend ready"; exit 0
              fi
              sleep 2
            done
            echo "Frontend not ready in 90s"
            sudo docker compose logs --tail 50 frontend
            exit 1
